name: Community Sync Pipeline
run-name: 🔍 Community Sync Pipeline

on:
  schedule:
    - cron: "*/20 14-23 * * *"
    - cron: "*/20 0-4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: community-sync
  cancel-in-progress: false

jobs:
  sync-community:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ✅ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      # ✅ Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      # ✅ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      # ✅ Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Check configuration
      - name: Check configuration
        run: pnpm jobctl setup check-config

        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          PAT: ${{ secrets.PAT }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

          LOG_PRETTY: "1"

      # ✅ Run community sync pipeline
      - name: Run community sync pipeline
        id: sync
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          PAT: ${{ secrets.PAT }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

          LOG_PRETTY: "1"
        run: |
          pnpm jobctl sync

          if [[ -n "$(git status --porcelain data/ 2>/dev/null)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No new jobs found."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      # ✅ Cancel workflow if no changes
      - name: Cancel workflow if no changes
        if: steps.sync.outputs.has_changes != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run cancel ${{ github.run_id }}

      # ✅ Commit and push updated data
      - name: Commit and push updated data
        if: steps.sync.outputs.has_changes == 'true'
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config user.name "actions-bot"
          git config user.email "actions@github.com"

          git add data/
          git commit -m "chore(community): update new jobs"

          git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"
          git push origin HEAD:${{ github.ref_name }}
