name: Notify Latest Jobs
run-name: 📬 Notify Latest Jobs

on:
  push:
    paths:
      - "data/jobs.ndjson"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

concurrency:
  group: notify-jobs
  cancel-in-progress: false

jobs:
  notify-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ✅ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # ✅ Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      # ✅ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      # ✅ Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Check configuration
      - name: Check configuration
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          PAT: ${{ secrets.PAT }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          LOG_PRETTY: "1"
        run: pnpm jobctl setup check-config

      # ✅ Notify jobs from current commit
      - name: Notify jobs from commit
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          PAT: ${{ secrets.PAT }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          LOG_PRETTY: "1"
        run: |
          echo "Commit SHA: ${{ github.sha }}"
          pnpm jobctl notify commit "${{ github.sha }}"
