name: ATS Discovery Pipeline
run-name: 🔍 ATS Discovery Pipeline

on:
  schedule:
    - cron: "0 13,23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  # Shared with every workflow that writes to data/company.json, opportunities.ndjson,
  # or urls.json — running two of these at once can produce a real, unrebasable content
  # conflict (both appending different new data at the same point), not just a trivial
  # divergence. Serializing them queues instead of racing.
  group: jobradar-data-write
  cancel-in-progress: false

jobs:
  discover-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check configuration
        run: pnpm jobctl setup check-config
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PAT: ${{ secrets.PAT }}
          LOG_PRETTY: "1"
      - name: Run ATS discovery pipeline
        id: sync
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PAT: ${{ secrets.PAT }}
          LOG_PRETTY: "1"
        run: |
          pnpm jobctl scan

          if [[ -n "$(git status --porcelain data/ 2>/dev/null)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No new discovery data found."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Cancel workflow if no changes
        if: steps.sync.outputs.has_changes != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

      - name: Commit and push updated data
        if: steps.sync.outputs.has_changes == 'true'
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config user.name "actions-bot"
          git config user.email "actions@github.com"

          git add data/
          git commit -m "chore(discovery): update new jobs"

          git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"

          attempt=1
          max_attempts=5
          until git push origin HEAD:${{ github.ref_name }}; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Failed to push after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts), rebasing onto latest and retrying..."
            attempt=$((attempt + 1))
            git fetch origin ${{ github.ref_name }}
            if ! git rebase origin/${{ github.ref_name }}; then
              echo "::error::Rebase conflict, aborting"
              git rebase --abort
              exit 1
            fi
            sleep $(( (RANDOM % 5) + 1 ))
          done
