name: Update README
run-name: 📬 Update README

on:
  push:
    paths:
      - "config.json"
      - "data/opportunities.ndjson"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ✅ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # ✅ Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      # ✅ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      # ✅ Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Update README
      - name: Update README
        id: update-readme
        run: pnpm update-readme

      # ✅ Commit README changes
      - name: Commit README changes
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "actions-bot"
          git config user.email "actions@github.com"

          git add README.md
          git commit -m "docs: update README job board"

          git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"
          git push origin HEAD:${{ github.ref_name }}
